name: Publish to npm

on:
  release:
    types: [published]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build

      - name: Run tests
        run: npm run test

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for trusted publishing
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # NOTE: do NOT `npm install -g npm@…` here. Reinstalling npm over itself in
      # the runner produced an npm whose libnpmpublish couldn't find its
      # `sigstore` dependency ("Cannot find module 'sigstore'"), breaking
      # `npm publish --provenance` regardless of the pinned version. The npm
      # bundled with the Node runtime is a complete install and publishes fine
      # (provenance is supported on npm >= 9.5 with NODE_AUTH_TOKEN).
      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm (trusted publishing)
        run: npm publish --provenance --access public
