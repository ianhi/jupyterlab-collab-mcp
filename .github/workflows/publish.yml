name: Publish to npm

on:
  release:
    types: [published]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build

      - name: Run tests
        run: npm run test

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for trusted publishing
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # Pin npm to 11.18.0 (the last 11.x, and the version that published 0.13.0
      # with trusted publishing + provenance). Do NOT use npm@latest: npm 12.0.0
      # (2026-07-08) shipped a broken provenance path missing its `sigstore`
      # module ("Cannot find module 'sigstore'"), so an unpinned @latest breaks
      # `npm publish --provenance` for any release after that date. Bump this pin
      # deliberately once a known-good newer npm is verified.
      - name: Pin npm for trusted publishing
        run: npm install -g npm@11.18.0

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm (trusted publishing)
        run: npm publish --provenance --access public
